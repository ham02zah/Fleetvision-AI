services:

  api:
    build: .
    container_name: fleetvision-api

    ports:
      - "8000:8000"

    env_file:
      - .env

    depends_on:
      - db
      - redis

    volumes:
      - .:/app

    restart: unless-stopped

  db:
    image: postgres:16
    container_name: fleetvision-postgres

    restart: always

    environment:
      POSTGRES_USER: fleetuser
      POSTGRES_PASSWORD: fleetpassword
      POSTGRES_DB: fleetvision

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: fleetvision-redis

    restart: unless-stopped

    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data: